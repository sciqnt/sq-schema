# Copy to <component>/.github/workflows/claude.yml — @claude fix-mode, inherited.
name: claude
on:
  issue_comment: { types: [created] }
  pull_request_review_comment: { types: [created] }
  issues: { types: [opened, assigned] }
jobs:
  claude:
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    uses: sciqnt/sq-constitution/.github/workflows/claude.yml@v1
    secrets: inherit
